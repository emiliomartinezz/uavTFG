[General]
network = dronestfg.simulations.DronesNetwork
sim-time-limit = 4000s

# ---------- Playground ----------
*.playgroundSizeX = 1500m
*.playgroundSizeY = 1300m
*.playgroundSizeZ = 500m

# ---------- TraCI Manager (veins_inet) ----------
*.manager.updateInterval = 1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("launch.xml")
*.manager.order = 1
*.manager.margin = 250

# ---------- Module mapping ----------
*.manager.moduleType = "uav_type=dronestfg.nodes.UAV *=dronestfg.nodes.UAV"
*.manager.moduleName = "uav_type=uav *=car"
*.manager.moduleDisplayString = "uav_type='i=block/aircraft' *='i=,tt='"

*.roadsVisualizer.drawRoads = true
*.roadsVisualizer.lineWidth = 2
*.roadsVisualizer.roadColor = "gray"


