[General]
network = dronestfg.simulations.DronesNetwork
sim-time-limit = 4000s
repeat = 1

# ---------- Playground (match Madrid scenario) ----------
*.playgroundSizeX = 3000m
*.playgroundSizeY = 3000m
*.playgroundSizeZ = 500m

# ---------- TraCI Manager: connects to SUMO as CLIENT 1 ----------
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.updateInterval = 1s
*.manager.autoShutdown = true

# Multi-client: OMNeT++ is client 1 (Python is client 0)
*.manager.order = 1

# Dynamic vehicle module type
*.manager.moduleType = "UAV"
*.manager.moduleName = "uav"

# ---------- gNodeB position (center of Madrid map) ----------
*.gnb.mobility.typename = "StationaryMobility"
*.gnb.mobility.initialX = 1500m
*.gnb.mobility.initialY = 1500m
*.gnb.mobility.initialZ = 25m

# ---------- Channel ----------
*.channelControl.pMax = 10W
*.channelControl.alpha = 1.0
*.channelControl.carrierFrequency = 3.5GHz

# ---------- UAV ↔ gNB association ----------
*.uav[*].macCellId = 1
*.uav[*].masterId = 1
*.uav[*].nrMacCellId = 1
*.uav[*].nrMasterId = 1

# ---------- UAV application (example) ----------
*.uav[*].numApps = 1
*.uav[*].app[0].typename = "UdpBasicApp"
*.uav[*].app[0].destAddresses = "server"
*.uav[*].app[0].destPort = 5000
*.uav[*].app[0].messageLength = 1000B
*.uav[*].app[0].sendInterval = 100ms
*.uav[*].app[0].startTime = uniform(0s, 1s)

*.server.numApps = 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 5000

# ---------- NED paths ----------
# Adjust these to your actual installation paths