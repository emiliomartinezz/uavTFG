[General]
network = dronestfg.simulations.DronesNetwork
sim-time-limit = 4000s

# ---------- Playground ----------
*.playgroundSizeX = 1500m
*.playgroundSizeY = 1300m
*.playgroundSizeZ = 500m

# ---------- TraCI Manager (veins_inet) ----------
*.manager.updateInterval = 1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("launch.xml")
*.manager.order = 1

# ---------- Module mapping ----------
*.manager.moduleType = "uav_type=dronestfg.nodes.UAV car_type=dronestfg.nodes.UAV"
*.manager.moduleName = "uav_type=uav car_type=car"
*.manager.moduleDisplayString = "uav_type='i=block/aircraft' car_type='i=block/process'"